spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/booking_tour_sonla?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
server.port=${SERVER_PORT:8080}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}
upload.dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.seed-admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed-admin.email=${APP_ADMIN_EMAIL:admin@gmail.com}
app.seed-admin.full-name=${APP_ADMIN_FULL_NAME:Administrator}
app.seed-admin.phone=${APP_ADMIN_PHONE:0123456789}
app.seed-admin.password=${APP_ADMIN_PASSWORD:123456}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
app.public-url=${APP_PUBLIC_URL:http://localhost:5173}
app.asset-public-url=${APP_ASSET_PUBLIC_URL:http://localhost:8080}
app.email.emailjs.enabled=${EMAILJS_ENABLED:false}
app.email.emailjs.service-id=${EMAILJS_SERVICE_ID:}
app.email.emailjs.template-id=${EMAILJS_TEMPLATE_ID:}
app.email.emailjs.public-key=${EMAILJS_PUBLIC_KEY:}
app.email.emailjs.private-key=${EMAILJS_PRIVATE_KEY:}
app.email.emailjs.admin-confirm.enabled=${EMAILJS_ADMIN_CONFIRM_ENABLED:false}
app.email.emailjs.admin-confirm.service-id=${EMAILJS_ADMIN_CONFIRM_SERVICE_ID:}
app.email.emailjs.admin-confirm.template-id=${EMAILJS_ADMIN_CONFIRM_TEMPLATE_ID:}
app.email.emailjs.admin-confirm.public-key=${EMAILJS_ADMIN_CONFIRM_PUBLIC_KEY:}
app.email.emailjs.admin-confirm.private-key=${EMAILJS_ADMIN_CONFIRM_PRIVATE_KEY:}
app.email.emailjs.tour-completed.enabled=${EMAILJS_TOUR_COMPLETED_ENABLED:false}
app.email.emailjs.tour-completed.service-id=${EMAILJS_TOUR_COMPLETED_SERVICE_ID:}
app.email.emailjs.tour-completed.template-id=${EMAILJS_TOUR_COMPLETED_TEMPLATE_ID:}
app.email.emailjs.tour-completed.public-key=${EMAILJS_TOUR_COMPLETED_PUBLIC_KEY:}
app.email.emailjs.tour-completed.private-key=${EMAILJS_TOUR_COMPLETED_PRIVATE_KEY:}
app.feedback-url=${APP_FEEDBACK_URL:}
